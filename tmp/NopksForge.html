<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <title>NopksForge — TE Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind for class utilities (kept so the markup ports cleanly to Next/Tailwind) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- IBM Plex pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Condensed:wght@600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --sans: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --display: "IBM Plex Sans Condensed", var(--sans);

      --accent: #ff5b1f;

      --led-orange: #ff5b1f;
      --led-green:  #1f8a5b;
      --led-amber:  #f4c542;
      --led-red:    #ff3b30;
      --led-off:    #1d1d1d;
    }

    /* ---- Light ---- */
    html[data-theme="light"] {
      color-scheme: light;
      --bg:         #f6f4ef;
      --surface:    #fbfaf6;
      --rule:       rgba(20,20,20,.10);
      --hover:      rgba(20,20,20,.04);
      --accent-soft:rgba(255,91,31,.08);

      --ink:        #131313;
      --silk:       #3a3a38;
      --silk-muted: #8a8780;

      /* legacy hardware vars retained so any stray Panel/Knob still renders ok */
      --chassis:    #fbfaf6;
      --panel-bg:   #fbfaf6;
      --panel-cream:#fbfaf6;
      --panel-dark: #131313;
      --panel-edge: rgba(20,20,20,.10);
      --sub-panel:  #f0eee8;
      --tag-bg:     #fbfaf6;
      --screw-hi:   #d8d4cb;
      --screw-lo:   #8a8780;
      --grille:     #d8d4cb;
      --rail-a:     #c8c4ba;
      --rail-b:     #b0aca2;
      --pad-hi:     #2a2a2a;
      --pad-lo:     #0d0d0d;
      --track-bg:   #1a1a1a;
    }

    /* ---- Dark ---- */
    html[data-theme="dark"] {
      color-scheme: dark;
      --bg:         #0d0d0d;
      --surface:    #141414;
      --rule:       rgba(255,255,255,.10);
      --hover:      rgba(255,255,255,.04);
      --accent-soft:rgba(255,91,31,.14);

      --ink:        #f4f1ea;
      --silk:       #c8c5bc;
      --silk-muted: #6e6b62;

      --chassis:    #141414;
      --panel-bg:   #141414;
      --panel-cream:#1a1a1a;
      --panel-dark: #050505;
      --panel-edge: rgba(255,255,255,.10);
      --sub-panel:  #161616;
      --tag-bg:     #1a1a1a;
      --screw-hi:   #3a3a36;
      --screw-lo:   #1a1a1a;
      --grille:     #2a2a2a;
      --rail-a:     #2a2a2a;
      --rail-b:     #161616;
      --pad-hi:     #2a2a2a;
      --pad-lo:     #0a0a0a;
      --track-bg:   #0a0a0a;
    }

    html, body { background: var(--bg); }
    body {
      font-family: var(--sans);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .te-mono { font-family: var(--mono); font-feature-settings: "ss01","cv01"; }
    .te-sans { font-family: var(--display); }

    .te-cursor::after {
      content: "";
      display: inline-block; width: 8px; height: 1em; background: currentColor;
      vertical-align: -2px; margin-left: 2px;
      animation: te-blink 1s steps(2,end) infinite;
    }
    .te-cursor { display: inline; }
    @keyframes te-blink { 50% { opacity: 0; } }

    .te-led-blink { animation: te-led 1.4s ease-in-out infinite; }
    @keyframes te-led { 0%,100% { opacity: 1; } 50% { opacity: .35; } }

    /* No texture — minimalism. */

    /* selection */
    ::selection { background: var(--accent); color: #fff; }

    /* hide native focus rings, replaced by panel chrome */
    button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Tweaks panel z-fix */
    .tweaks-panel-host { z-index: 90 !important; }
  </style>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Sound engine (plain JS) -->
  <script src="sound.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Babel-compiled JSX, in dependency order -->
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="boot.jsx"></script>
  <script type="text/babel" src="header.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="tools.jsx"></script>
  <script type="text/babel" src="about.jsx"></script>
  <script type="text/babel" src="project-detail.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
